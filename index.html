<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <title>2026犯保週有獎徵答</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#1e2b3c;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
    .app{width:100%;max-width:550px;background:#f5f3f0;border-radius:32px;overflow:hidden;display:flex;flex-direction:column;height:90vh;max-height:750px;box-shadow:0 20px 40px rgba(0,0,0,0.3);position:relative}
    
    .marquee-container{background:#000;color:#ff0000;padding:8px 0;overflow:hidden;white-space:nowrap;font-family:'Courier New',monospace;font-weight:bold;font-size:1rem;letter-spacing:2px;border-bottom:2px solid #ff0000;display:none}
    .marquee-text{display:inline-block;animation:marquee 12s linear infinite;padding-left:100%}
    @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
    
    .header{background:#2c5a6e;padding:16px 20px;color:white;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative}
    .header-title{flex:1}
    .header h1{font-size:1.2rem}
    .header p{font-size:0.7rem;opacity:0.9;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .breath-light{display:inline-block;width:12px;height:12px;background-color:#00ff00;border-radius:50%;box-shadow:0 0 5px #00ff00;animation:breath 1.5s ease-in-out infinite;vertical-align:middle;margin-right:6px}
    @keyframes breath{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
    .stats-badge{position:absolute;right:15px;top:50%;transform:translateY(-50%);background:#ffd966;color:#333;padding:4px 10px;border-radius:20px;font-size:0.65rem;font-weight:bold;box-shadow:0 2px 5px rgba(0,0,0,0.2)}
    @media (max-width: 480px) {
      .stats-badge{top:60%;transform:translateY(-60%);font-size:0.6rem;padding:3px 8px}
    }
    .msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;background:#e9e6e0}
    .msg{display:flex;flex-direction:column;animation:slideIn 0.2s ease;max-width:100%}
    .msg.bot{align-items:flex-start}
    .msg.user{align-items:flex-end}
    .msg-header{display:flex;gap:8px;margin-bottom:4px;align-items:center}
    .icon{font-size:1.5rem}
    .user-avatar{width:32px;height:32px;background:#2c5a6e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:bold;color:white}
    .bubble{max-width:90%;padding:12px 16px;border-radius:20px;line-height:1.5;font-size:0.95rem;word-break:break-word;white-space:pre-wrap}
    .bot .bubble{background:white;border-bottom-left-radius:4px;color:#1e2b3c}
    .user .bubble{background:#2c5a6e;color:white;border-bottom-right-radius:4px}
    .bubble .separator-line {
      display: inline-block;
      width: 100%;
      letter-spacing: normal;
      word-break: keep-all;
      white-space: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 480px) {
      .bubble .separator-line {
        font-size: 0.75rem;
        letter-spacing: -0.5px;
      }
      .bubble {
        max-width: 95%;
        font-size: 0.85rem;
      }
    }
    .options{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;justify-content:center;width:100%}
    .opt{background:#e8e4dd;border:2px solid #c0b9ae;padding:8px 14px;border-radius:50px;font-size:0.9rem;font-weight:bold;cursor:pointer;min-width:55px;text-align:center}
    .opt:active{transform:scale(0.97)}
    .opt.disabled{background:#ccc;border-color:#999;cursor:not-allowed;opacity:0.6;transform:none;pointer-events:none}
    .opt-tf{background:#e8e4dd;border:2px solid #c0b9ae;padding:8px 22px;border-radius:50px;font-size:0.9rem;font-weight:bold;cursor:pointer}
    .opt-tf:active{transform:scale(0.97)}
    .opt-tf.disabled{background:#ccc;border-color:#999;cursor:not-allowed;opacity:0.6;transform:none;pointer-events:none}
    @media (max-width: 480px) {
      .opt{padding:6px 10px;font-size:0.8rem;min-width:45px}
      .opt-tf{padding:6px 16px;font-size:0.8rem}
      .options{gap:6px}
    }
    .share-btns{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
    .share-line{background:#06c755;color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;font-size:0.9rem}
    .share-fb{background:#1877f2;color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;font-size:0.9rem}
    .input-area{background:white;padding:12px 16px;display:flex;gap:10px;border-top:1px solid #ddd;flex-shrink:0}
    #input{flex:1;padding:12px;border:1px solid #ccc;border-radius:30px;font-size:0.9rem;outline:none}
    #input:focus{border-color:#ff9f4a}
    #input:disabled{background:#f0f0f0;color:#999}
    #send{background:#ff9f4a;border:none;padding:0 20px;border-radius:30px;font-weight:bold;cursor:pointer}
    #send:disabled{background:#ccc;cursor:not-allowed}
    .expired-notice{background:#d32f2f;color:white;padding:12px;margin:10px 0;border-radius:12px;text-align:center;font-weight:bold;animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:0.8}50%{opacity:1;box-shadow:0 0 10px rgba(211,47,47,0.5)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="app">
  <div id="marquee" class="marquee-container">
    <div class="marquee-text">⚠️ 活動進入倒數、敬請把握！ ⚠️ 活動進入倒數、敬請把握！ ⚠️ 活動進入倒數、敬請把握！</div>
  </div>
  <div class="header">
    <div class="header-title">
      <h1>2026 犯保週有獎徵答</h1>
      <p><span class="breath-light"></span>小幫手「阿保」｜對話式測驗</p>
    </div>
    <div id="statsBadge" class="stats-badge">👥 載入中...</div>
  </div>
  <div id="msgs" class="msgs"></div>
  <div class="input-area">
    <input type="text" id="input" inputmode="text" placeholder="輸入答案..." autocomplete="off">
    <button id="send">傳送</button>
  </div>
</div>

<script>
(function(){
  // ============================================================
  // ⚙️ 請修改這裡！填入您的 GAS 部署網址
  // ============================================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycby9idv95Gh_ihqmiEZ7f8ynS7equAnfaVgUqMJWJyjsZi56VgckRxWp8FqWM-_hlFCj4g/exec";
  // ============================================================
  
  const ACTIVITY_END_DATE = new Date(2026, 4, 1, 22, 59, 59);
  const MARQUEE_SPEED = 12;
  
  let step = "askName";
  let user = { name: "", town: "", addr: "", id: "", phone: "", device: "" };
  let tfQuestions = [];
  let mcQuestions = [];
  let selectedTF = [];
  let selectedMC = [];
  let currentQuestionType = "";
  let qIndex = 0;
  let answers = {};
  let finalScore = 0;
  let canInput = true;
  let totalTFCount = 0;
  let totalMCCount = 0;
  let errorCount = 0;
  let isLocked = false;
  let isTyping = false;
  let answeredQuestions = new Set();
  let currentButtonPanel = null;
  let totalParticipants = 0;
  let isActivityExpired = false;
  
  const msgsDiv = document.getElementById("msgs");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const marqueeDiv = document.getElementById("marquee");
  const statsBadge = document.getElementById("statsBadge");
  
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  
  // ============================================================
  // 呼叫 GAS 後端的函數
  // ============================================================
  async function callGAS(action, params = {}) {
    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...params })
      });
      const result = await response.json();
      return result;
    } catch (error) {
      console.error(`呼叫 ${action} 失敗:`, error);
      return { success: false, error: error.message };
    }
  }
  
  function setInputRestrictions() {
    let maxLen = 100;
    if(step === "askName") { maxLen = 10; } 
    else if(step === "askAddr") { maxLen = 25; }
    else if(step === "askId") { maxLen = 10; }
    else if(step === "askPhone") { maxLen = 10; }
    else { maxLen = 100; }
    inputEl.maxLength = maxLen;
    if(step === "askPhone") {
      inputEl.setAttribute("inputmode", "numeric");
      inputEl.setAttribute("pattern", "[0-9]*");
    } else {
      inputEl.setAttribute("inputmode", "text");
      inputEl.removeAttribute("pattern");
    }
  }
  
  function filterInput() {
    let val = inputEl.value;
    if(step === "askPhone") {
      val = val.replace(/[^0-9]/g, '');
      if(val.length > 10) val = val.substring(0, 10);
      inputEl.value = val;
    }
    else if(step === "askId") {
      if(val.length > 0) {
        let first = val.charAt(0).toUpperCase();
        let rest = val.substring(1).replace(/[^0-9]/g, '');
        if(rest.length > 9) rest = rest.substring(0, 9);
        let newVal = first + rest;
        if(newVal.length > 10) newVal = newVal.substring(0, 10);
        if(newVal !== val) inputEl.value = newVal;
      }
      if(inputEl.value.length > 10) inputEl.value = inputEl.value.substring(0, 10);
    }
    else if(step === "askName") {
      let newVal = val.replace(/[^A-Za-z\u4e00-\u9fa5]/g, '');
      if(newVal.length > 10) newVal = newVal.substring(0, 10);
      if(newVal !== val) inputEl.value = newVal;
    }
    else if(step === "askAddr") {
      if(val.length > 25) inputEl.value = val.substring(0, 25);
    }
  }
  
  function updateRestrictionsOnStepChange() {
    setInputRestrictions();
    filterInput();
  }
  
  function checkActivityExpired() {
    const now = new Date();
    const endDate = new Date(ACTIVITY_END_DATE);
    if(now > endDate) {
      isActivityExpired = true;
      disableInput(true);
      addMsgWithoutTyping("⛔ 活動已結束！⛔\n\n感謝您的支持，本次有獎徵答活動已截止。\n\n抽獎活動相關訊息,請密切注意官方最新活動資訊！", "bot");
      return true;
    }
    return false;
  }
  
  function getUserDisplayName() {
    if(!user.name || user.name.length === 0) return { avatar: "?", display: "" };
    return { avatar: user.name.charAt(0), display: user.name.substring(1) };
  }
  
  function setMarqueeSpeed() {
    const marqueeText = document.querySelector('.marquee-text');
    if(marqueeText) marqueeText.style.animation = `marquee ${MARQUEE_SPEED}s linear infinite`;
  }
  
  function checkAndShowMarquee() {
    if(isActivityExpired) return;
    const now = new Date();
    const endDate = new Date(ACTIVITY_END_DATE);
    const daysRemaining = Math.ceil((endDate - now) / (1000 * 60 * 60 * 24));
    if(daysRemaining <= 3 && daysRemaining >= 0) {
      marqueeDiv.style.display = "block";
      setMarqueeSpeed();
    } else {
      marqueeDiv.style.display = "none";
    }
  }
  
  async function fetchParticipantCount() {
    const result = await callGAS("getStats");
    if(result && typeof result.total === 'number') {
      totalParticipants = result.total;
      statsBadge.innerHTML = `👥 ${totalParticipants}人`;
    } else {
      statsBadge.innerHTML = `👥 統計中`;
    }
  }
  
  setInterval(fetchParticipantCount, 30000);
  
  function autoFocus() {
    if(!isMobile && !inputEl.disabled && step !== "confirmData" && step !== "readyQuiz" && step !== "quiz"){
      setTimeout(() => inputEl.focus(), 100);
    }
  }
  
  function disableInput(disabled) {
    inputEl.disabled = disabled;
    sendBtn.disabled = disabled;
  }
  
  function lockSession() {
    isLocked = true;
    disableInput(true);
    addMsgWithoutTyping("⚠️ 偵測到多次錯誤輸入，本次測驗已鎖定！請重新整理頁面後再試。", "bot");
  }
  
  function recordError() {
    errorCount++;
    if(errorCount >= 5 && !isLocked) { lockSession(); return true; }
    return false;
  }
  
  function scrollBottom() { setTimeout(() => { msgsDiv.scrollTop = msgsDiv.scrollHeight; }, 50); }
  
  function addMsgWithoutTyping(text, who, btns, isQuiz = false) {
    const div = document.createElement("div");
    div.className = "msg " + who;
    const header = document.createElement("div");
    header.className = "msg-header";
    if(who === "bot") {
      const icon = document.createElement("div");
      icon.className = "icon";
      icon.innerText = "🤖";
      const nameSpan = document.createElement("span");
      nameSpan.style.fontSize = "0.7rem";
      nameSpan.style.opacity = "0.7";
      nameSpan.innerText = "阿保";
      header.appendChild(icon);
      header.appendChild(nameSpan);
    } else {
      const displayInfo = getUserDisplayName();
      const userAvatar = document.createElement("div");
      userAvatar.className = "user-avatar";
      userAvatar.innerText = displayInfo.avatar;
      const nameSpan = document.createElement("span");
      nameSpan.style.fontSize = "0.7rem";
      nameSpan.style.opacity = "0.7";
      nameSpan.innerText = displayInfo.display || "";
      header.appendChild(userAvatar);
      header.appendChild(nameSpan);
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    let displayText = text;
    if(text.includes("━━━━━━━━━━━━━━━━━━━━")) {
      displayText = text.replace(/━━━━━━━━━━━━━━━━━━━━/g, '<span class="separator-line">━━━━━━━━━━━━━━━━━━━━</span>');
    }
    bubble.innerHTML = displayText.replace(/\n/g,"<br>");
    div.appendChild(header);
    div.appendChild(bubble);
    msgsDiv.appendChild(div);
    if(btns && btns.length){
      const panel = document.createElement("div");
      panel.className = "options";
      for(let i=0; i<btns.length; i++){
        const b = document.createElement("button");
        b.innerText = btns[i].label;
        b.className = btns[i].type === "tf" ? "opt-tf" : "opt";
        b.onclick = (function(val) { return function() { handleInput(val); }; })(btns[i].value);
        panel.appendChild(b);
      }
      bubble.after(panel);
      currentButtonPanel = panel;
    }
    scrollBottom();
    autoFocus();
    return div;
  }
  
  function addMsgWithTyping(text, who, btns) {
    if(who === "user") { addMsgWithoutTyping(text, who, btns); return; }
    if(isTyping) return;
    isTyping = true;
    const div = document.createElement("div");
    div.className = "msg " + who;
    const header = document.createElement("div");
    header.className = "msg-header";
    const icon = document.createElement("div");
    icon.className = "icon";
    icon.innerText = "🤖";
    const nameSpan = document.createElement("span");
    nameSpan.style.fontSize = "0.7rem";
    nameSpan.style.opacity = "0.7";
    nameSpan.innerText = "阿保";
    header.appendChild(icon);
    header.appendChild(nameSpan);
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    div.appendChild(header);
    div.appendChild(bubble);
    msgsDiv.appendChild(div);
    let processedText = text;
    if(text.includes("━━━━━━━━━━━━━━━━━━━━")) {
      processedText = text.replace(/━━━━━━━━━━━━━━━━━━━━/g, '<span class="separator-line">━━━━━━━━━━━━━━━━━━━━</span>');
    }
    const formattedText = processedText;
    let i = 0;
    const speed = 50;
    function typeNext() {
      if(i < formattedText.length) {
        bubble.innerHTML = formattedText.substring(0, i+1).replace(/\n/g,"<br>");
        i++;
        scrollBottom();
        setTimeout(typeNext, speed);
      } else {
        isTyping = false;
        scrollBottom();
        if(btns && btns.length){
          const panel = document.createElement("div");
          panel.className = "options";
          for(let j=0; j<btns.length; j++){
            const b = document.createElement("button");
            b.innerText = btns[j].label;
            b.className = btns[j].type === "tf" ? "opt-tf" : "opt";
            b.onclick = (function(val) { return function() { handleInput(val); }; })(btns[j].value);
            panel.appendChild(b);
          }
          bubble.after(panel);
          currentButtonPanel = panel;
          scrollBottom();
        }
        autoFocus();
      }
    }
    typeNext();
  }
  
  function botMsg(text, btns, useTyping = true, isQuiz = false) {
    if(useTyping && step !== "quiz" && step !== "readyQuiz") {
      addMsgWithTyping(text, "bot", btns);
    } else {
      addMsgWithoutTyping(text, "bot", btns, isQuiz);
    }
  }
  
  function showConfirmScreen() {
    disableInput(true);
    const confirmMsg = "📋 請核對您的資料\n\n━━━━━━━━━━━━━━━━━━━━\n👤 姓名：" + user.name + "\n🏘️ 鄉鎮：" + user.town + "\n🏠 地址：" + user.addr + "\n🆔 身分證：" + user.id + "\n📱 手機：" + user.phone + "\n💻 裝置：" + user.device + "\n━━━━━━━━━━━━━━━━━━━━\n\n⚠️ 資料錯誤無法參加抽獎或領取獎項！請您仔細核對！！\n\n✅ 確認無誤請按「正確送出」\n✏️ 需要修改請按「我要修改」";
    const confirmBtns = [
      {label:"✅ 正確送出", value:"confirm", type:"tf"},
      {label:"✏️ 我要修改", value:"modify", type:"tf"}
    ];
    botMsg(confirmMsg, confirmBtns, true);
    step = "confirmData";
    updateRestrictionsOnStepChange();
    canInput = true;
  }
  
  async function handleInput(raw){
    if(!canInput || isLocked || isTyping) return;
    if(isActivityExpired) { botMsg("活動已結束，感謝您的參與！", null, false); return; }
    
    if(step === "confirmData"){
      if(raw === "modify"){
        disableInput(false);
        botMsg("📝 好的，讓我們重新填寫資料。請輸入您的真實姓名 👇", null, true);
        step = "askName";
        updateRestrictionsOnStepChange();
        user = { name: "", town: "", addr: "", id: "", phone: "", device: "" };
        canInput = true;
        autoFocus();
        return;
      } else if(raw === "confirm"){
        botMsg("🎉 資料確認無誤！\n\n準備抽選測驗題目...\n\n- 是非題 5 題（每題10分）\n- 選擇題 5 題（每題10分）\n\n點擊「開始測驗」按鈕開始答題 👇", [
          {label:"🎯 開始測驗", value:"開始", type:"tf"}
        ], true);
        step = "readyQuiz";
        updateRestrictionsOnStepChange();
        canInput = true;
        return;
      } else {
        botMsg("請點選「正確送出」或「我要修改」按鈕", null, false);
        canInput = true;
        return;
      }
    }
    
    const val = raw.trim();
    if(!val && step !== "quiz"){ botMsg("請輸入內容～", null, true); autoFocus(); return; }
    
    canInput = false;
    addMsgWithoutTyping(val || "✅", "user");
    
    if(step === "askName"){
      if(!/^[A-Za-z\u4e00-\u9fa5]{1,10}$/.test(val)){
        botMsg("姓名只能包含中文或英文，長度1~10個字，請重新輸入", null, true);
        canInput = true;
        if(recordError()) return;
        return;
      }
      user.name = val;
      botMsg("嗨 " + user.name + "！請選擇您的居住鄉鎮：", [
        {label:"南竿鄉",value:"南竿鄉"},{label:"北竿鄉",value:"北竿鄉"},
        {label:"莒光鄉",value:"莒光鄉"},{label:"東引鄉",value:"東引鄉"}
      ], true);
      step = "askTown";
      updateRestrictionsOnStepChange();
      canInput = true;
      return;
    }
    
    if(step === "askTown"){
      const towns = ["南竿鄉","北竿鄉","莒光鄉","東引鄉"];
      if(!towns.includes(val)){
        botMsg("請點選上方鄉鎮按鈕", [ {label:"南竿鄉",value:"南竿鄉"},{label:"北竿鄉",value:"北竿鄉"},{label:"莒光鄉",value:"莒光鄉"},{label:"東引鄉",value:"東引鄉"} ], true);
        canInput = true;
        if(recordError()) return;
        return;
      }
      user.town = val;
      botMsg("📮 請輸入地址（結尾須為「號」，最多25字）\n例如：介壽村200號", null, true);
      step = "askAddr";
      updateRestrictionsOnStepChange();
      canInput = true;
      return;
    }
    
    if(step === "askAddr"){
      if(val.length > 25){ botMsg("地址字數過長，請精簡輸入（最多25字）", null, true); canInput = true; if(recordError()) return; return; }
      if(!/號$/.test(val)){ botMsg("地址結尾必須是「號」，例如：復興村123號", null, true); canInput = true; if(recordError()) return; return; }
      user.addr = val;
      botMsg("🔢 請輸入身分證字號（第一個英文字母會自動轉為大寫，共10碼）\n範例：A123456789", null, true);
      step = "askId";
      updateRestrictionsOnStepChange();
      canInput = true;
      return;
    }
    
    if(step === "askId"){
      let upperVal = val.toUpperCase();
      if(!/^[A-Z][0-9]{9}$/.test(upperVal)){
        botMsg("身分證格式錯誤，請輸入大寫英文+9碼數字\n範例：A123456789", null, true);
        canInput = true;
        if(recordError()) return;
        return;
      }
      user.id = upperVal;
      botMsg("🔍 驗證中...", null, false);
      const result = await callGAS("checkID", { id: user.id });
      if(result && result.valid) {
        botMsg("✅ 驗證通過！請輸入手機號碼（09開頭10碼）\n範例：0912345678", null, true);
        step = "askPhone";
        updateRestrictionsOnStepChange();
        canInput = true;
        autoFocus();
      } else {
        botMsg("❌ 身分證驗證失敗，請重新輸入", null, true);
        canInput = true;
        if(recordError()) return;
      }
      return;
    }
    
    if(step === "askPhone"){
      if(!/^09[0-9]{8}$/.test(val)){
        botMsg("手機格式錯誤，須為 09xxxxxxxx 共10碼\n只能輸入數字", null, true);
        canInput = true;
        if(recordError()) return;
        return;
      }
      user.phone = val;
      user.device = isMobile ? "手機" : "電腦";
      showConfirmScreen();
      return;
    }
    
    if(step === "readyQuiz"){
      if(val !== "開始"){
        botMsg("請點選「開始測驗」按鈕開始答題", [{label:"🎯 開始測驗", value:"開始", type:"tf"}], false);
        canInput = true;
        if(recordError()) return;
        return;
      }
      botMsg("📚 載入題庫中...", null, false);
      canInput = false;
      const bank = await callGAS("getQuestionBank");
      if(!bank.success){
        botMsg("題庫讀取失敗："+(bank.error||"請聯絡管理員"), null, false);
        canInput = true;
        return;
      }
      
      tfQuestions = bank.data.trueFalse.map(q => ({id:q.id, q:q.question, ans:q.answer, type:"tf"}));
      mcQuestions = bank.data.multipleChoice.map(q => ({id:q.id, q:q.question, opts:q.options, ans:q.answer, type:"mc"}));
      selectedTF = [...tfQuestions].sort(()=>Math.random()-0.5).slice(0,5);
      selectedMC = [...mcQuestions].sort(()=>Math.random()-0.5).slice(0,5);
      totalTFCount = selectedTF.length;
      totalMCCount = selectedMC.length;
      currentQuestionType = "tf";
      qIndex = 0;
      answers = {};
      answeredQuestions.clear();
      disableInput(true);
      step = "quiz";
      canInput = true;
      showQuestion();
      return;
    }
    
    if(step === "quiz"){
      let currentList = (currentQuestionType === "tf") ? selectedTF : selectedMC;
      let qq = currentList[qIndex];
      if(answeredQuestions.has(currentQuestionType + "_" + qq.id)) { canInput = true; return; }
      let selected = "";
      if(currentQuestionType === "tf"){
        if(val === "對") selected = "TRUE";
        else if(val === "錯") selected = "FALSE";
        else {
          botMsg("請點選「對」或「錯」按鈕回答", [{label:"✅ 對", value:"對", type:"tf"},{label:"❌ 錯", value:"錯", type:"tf"}], false);
          canInput = true;
          if(recordError()) return;
          return;
        }
      } else {
        let up = val.toUpperCase();
        if(up !== "A" && up !== "B" && up !== "C" && up !== "D"){
          botMsg("請點選 Ⓐ Ⓑ Ⓒ Ⓓ 按鈕回答", [{label:"Ⓐ", value:"A"},{label:"Ⓑ", value:"B"},{label:"Ⓒ", value:"C"},{label:"Ⓓ", value:"D"}], false);
          canInput = true;
          if(recordError()) return;
          return;
        }
        selected = up;
      }
      answeredQuestions.add(currentQuestionType + "_" + qq.id);
      answers[qq.id] = selected;
      if(qIndex + 1 < currentList.length){
        qIndex++;
        showQuestion();
        canInput = true;
      } else {
        if(currentQuestionType === "tf" && selectedMC.length > 0){
          currentQuestionType = "mc";
          qIndex = 0;
          botMsg("📖 是非題完成！現在進入選擇題部分～\n", null, false);
          showQuestion();
          canInput = true;
        } else {
          computeResult();
        }
      }
      return;
    }
  }
  
  function showQuestion(){
    let currentList = (currentQuestionType === "tf") ? selectedTF : selectedMC;
    let q = currentList[qIndex];
    let total = (currentQuestionType === "tf") ? totalTFCount : totalMCCount;
    let typeName = (currentQuestionType === "tf") ? "是非題" : "選擇題";
    let txt = "📌 " + typeName + " 第" + (qIndex+1) + "/" + total + "題\n\n" + q.q + "\n";
    let btns = null;
    if(currentQuestionType === "tf"){
      txt += "\n請點選下方按鈕回答：";
      btns = [{label:"✅ 對", value:"對", type:"tf"},{label:"❌ 錯", value:"錯", type:"tf"}];
    } else {
      txt += "\nⒶ " + q.opts.A + "\nⒷ " + q.opts.B + "\nⒸ " + q.opts.C + "\nⒹ " + q.opts.D + "\n\n請點選下方按鈕回答：";
      btns = [{label:"Ⓐ", value:"A"},{label:"Ⓑ", value:"B"},{label:"Ⓒ", value:"C"},{label:"Ⓓ", value:"D"}];
    }
    botMsg(txt, btns, false, true);
  }
  
  async function computeResult(){
    let score = 0;
    for(let q of selectedTF) if(answers[q.id] === (q.ans ? "TRUE" : "FALSE")) score += 10;
    for(let q of selectedMC) if(answers[q.id] === q.ans) score += 10;
    finalScore = score;
    
    await callGAS("saveData", {
      name: user.name, town: user.town, address: user.addr,
      id: user.id, phone: user.phone, score: finalScore, device: user.device
    });
    
    let medal = finalScore === 100 ? "🏆 滿分天才！" : (finalScore >= 70 ? "🎖️ 表現優異" : "📖 再加油！");
    let resultMsg = "📊 測驗完成！\n\n⭐ 您的總分："+finalScore+" 分 / 100 分\n"+medal+"\n\n感謝參加「2026犯罪被害人保護週」有獎徵答！";
    botMsg(resultMsg, null, false);
    
    const shareDiv = document.createElement("div");
    shareDiv.className = "share-btns";
    const lineBtn = document.createElement("button");
    lineBtn.innerText = "📱 LINE 分享";
    lineBtn.className = "share-line";
    lineBtn.onclick = () => window.open("https://line.me/R/msg/text/?"+encodeURIComponent("🎁 我完成「2026犯保週有獎徵答」，獲得 "+finalScore+" 分！一起來挑戰～")+"%0A"+window.location.href, "_blank");
    const fbBtn = document.createElement("button");
    fbBtn.innerText = "📘 Facebook 分享";
    fbBtn.className = "share-fb";
    fbBtn.onclick = () => window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(window.location.href), "_blank");
    shareDiv.appendChild(lineBtn);
    shareDiv.appendChild(fbBtn);
    const lastMsg = msgsDiv.lastChild;
    if(lastMsg && lastMsg.querySelector(".bubble")) lastMsg.querySelector(".bubble").after(shareDiv);
    
    step = "done";
    canInput = true;
    inputEl.placeholder = "測驗完成，可分享";
    fetchParticipantCount();
  }
  
  inputEl.addEventListener("input", filterInput);
  inputEl.addEventListener("focus", function() { setInputRestrictions(); });
  sendBtn.onclick = function() { const v = inputEl.value.trim(); if(v && !inputEl.disabled && step !== "confirmData" && step !== "quiz"){ inputEl.value = ""; handleInput(v); } };
  inputEl.addEventListener("keypress", function(e) { if(e.key === "Enter" && !inputEl.disabled && step !== "confirmData" && step !== "quiz") sendBtn.click(); });
  
  const expired = checkActivityExpired();
  if(!expired) {
    checkAndShowMarquee();
    fetchParticipantCount();
    
    const isAppleDevice = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    let welcomeMsg = "🤖 嗨～我是犯保週小幫手「阿保」！\n\n2026 犯罪被害人保護週有獎徵答活動開跑！\n\n我會一步一步引導你填寫資料，並進行測驗：\n• 5題是非題（每題10分）\n• 5題選擇題（每題10分）\n\n請輸入你的「真實姓名」開始吧 👇";
    if(isAppleDevice) {
      welcomeMsg += "\n\n💡 蘋果手機用戶如果畫面體驗不佳，請用雙指捏合調整頁面 🤏";
      addMsgWithoutTyping(welcomeMsg.replace("💡 蘋果手機用戶如果畫面體驗不佳，請用雙指捏合調整頁面 🤏", '<span style="color:#ff69b4;">💡 蘋果手機用戶如果畫面體驗不佳，請用雙指捏合調整頁面 🤏</span>'), "bot", null);
    } else {
      botMsg(welcomeMsg, null, true);
    }
    step = "askName";
    updateRestrictionsOnStepChange();
    canInput = true;
    autoFocus();
  }
})();
</script>
</body>
</html>
